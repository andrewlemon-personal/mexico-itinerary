<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mexico 2026 Itinerary — Yolo-style Day Card</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <style>
    :root{
      --bg:#0b0c10; --panel:#12141a; --card:#171a21; --muted:#9aa4b2; --text:#e8edf3;
      --line:#242a35; --accent:#7dd3fc; --accent2:#a78bfa;
      --yolo:#fbbf24;
    }
    *{box-sizing:border-box}
    html, body{height:100%;margin:0}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;background:var(--bg);color:var(--text);overflow:hidden}

    .app{display:grid;grid-template-columns:420px 1fr;height:100vh;min-height:0}
    .sidebar{
      background:var(--panel);border-right:1px solid var(--line);
      display:flex;flex-direction:column;height:100vh;min-height:0;min-width:320px;
    }
    .sidebar header{padding:16px 16px 10px;border-bottom:1px solid var(--line);flex:0 0 auto}
    .title{font-size:16px;font-weight:700;margin:0 0 6px}
    .subtitle{margin:0;color:var(--muted);font-size:12px;line-height:1.4}
    .controls{display:flex;gap:8px;padding:12px 16px;border-bottom:1px solid var(--line);flex:0 0 auto}
    .controls input{width:100%;padding:10px 12px;background:#0f1116;border:1px solid var(--line);border-radius:10px;color:var(--text);outline:none}
    .controls button{padding:10px 12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#091014;border-radius:10px;font-weight:700;cursor:pointer;white-space:nowrap}
    .daylist{flex:1 1 auto;min-height:0;overflow-y:auto;overflow-x:hidden;padding:12px 12px 18px}

    .day{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 4px;cursor:pointer;transition:transform .08s ease,border-color .08s ease}
    .day:hover{transform:translateY(-1px);border-color:#334155}
    .day.active{border-color:var(--accent);box-shadow:0 0 0 1px rgba(125,211,252,.25) inset}
    .day h3{margin:0;font-size:13px;line-height:1.25}
    .meta{color:var(--muted);font-size:12px;margin-top:6px;line-height:1.35}
    .pillrow{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
    .pill{font-size:11px;padding:4px 8px;border:1px solid var(--line);border-radius:999px;color:var(--muted);background:#0f1116}
    .pill.route{color:#2a1a03;background:rgba(251,191,36,.18);border-color:rgba(251,191,36,.35)}
    .pill.flight{color:#2b0812;background:rgba(251,113,133,.18);border-color:rgba(251,113,133,.35)}

    .map{display:flex;flex-direction:column;height:100vh;min-height:0;overflow:hidden}
    #map{flex:1 1 auto;min-height:0;width:100%}
    .route-shadow{filter: drop-shadow(0 0 8px rgba(251,191,36,.22));}

    /* --- Yolo-ish day card — bottom bar --- */
    .daycard{
      flex:0 0 auto;
      width:100%;
      max-height:38vh;
      overflow:hidden;
      background:rgba(13,14,18,.98);
      border-top:1px solid var(--line);
      padding:10px 16px 10px;
      box-shadow: 0 -8px 32px rgba(0,0,0,.45);
      display:none; /* hidden until a day is selected */
      flex-direction:column;
    }
    /* inner scroll area */
    .daycard-scroll{
      overflow-y:auto;
      flex:1 1 auto;
      min-height:0;
    }
    .daycard-head{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding-bottom:8px;margin-bottom:8px;border-bottom:1px solid rgba(36,42,53,.65);
      flex:0 0 auto;
    }
    .daycard-meta{display:flex;align-items:center;gap:14px;flex:1;min-width:0}
    .daycard-kicker{
      color:var(--yolo);
      font-weight:800;
      font-size:11px;
      letter-spacing:.08em;
      text-transform:uppercase;
      margin:0;
      white-space:nowrap;
    }
    .daycard-title{margin:0;font-size:13px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .daycard-sub{margin:0;color:var(--muted);font-size:11px;white-space:nowrap}
    .iconbtn{
      border:1px solid var(--line);
      background:#0f1116;color:var(--text);
      width:28px;height:28px;border-radius:8px;cursor:pointer;display:grid;place-items:center;flex:0 0 auto;
      font-size:11px;
    }

    .chips{display:flex;flex-wrap:wrap;gap:4px;margin:0}
    .chip{font-size:10px;padding:2px 7px;border-radius:999px;border:1px solid var(--line);background:#0f1116;color:var(--muted)}
    .chip.stay{background:rgba(125,211,252,.12);border-color:rgba(125,211,252,.28);color:var(--accent)}
    .chip.route{background:rgba(251,191,36,.16);border-color:rgba(251,191,36,.35);color:var(--yolo)}

    /* Main content grid — horizontal columns */
    .blocks{
      display:grid;
      grid-template-columns: minmax(160px,1.2fr) 2fr 1.2fr 1fr;
      gap:10px;
      align-items:start;
    }
    .block{
      background:#0f1116;border:1px solid var(--line);border-radius:12px;padding:8px 10px;
      height:100%;
    }
    .block h4{margin:0 0 5px;font-size:11px;color:#8b97a8;text-transform:uppercase;letter-spacing:.06em}
    .block ul{margin:0;padding-left:16px;color:#dbe5f0;font-size:11px;line-height:1.5}
    .muted{color:var(--muted);font-size:11px;line-height:1.5}

    .ampm{
      display:grid;
      grid-template-columns: 1fr;
      gap:6px;
    }
    .row{
      display:flex;gap:8px;align-items:flex-start;
      padding:6px 8px;border-radius:10px;border:1px solid rgba(36,42,53,.65);background:rgba(15,17,22,.55);
    }
    .badge{
      flex:0 0 auto;
      width:36px;height:22px;
      border-radius:999px;
      display:grid;place-items:center;
      font-weight:800;font-size:10px;
      background:rgba(251,191,36,.18);
      border:1px solid rgba(251,191,36,.35);
      color:var(--yolo);
    }
    .row h5{margin:0;font-size:11px;color:#e8edf3}
    .row p{margin:2px 0 0;font-size:11px;color:#9aa4b2;line-height:1.4}

    .dinner-grid{display:flex;flex-direction:column;gap:6px}
    .dinner-picks{display:grid;gap:5px}
    .pick{
      display:flex;gap:8px;align-items:flex-start;
      padding:6px 8px;border-radius:10px;border:1px solid rgba(36,42,53,.65);background:rgba(15,17,22,.55);
    }
    .dot{
      width:8px;height:8px;border-radius:999px;margin-top:3px;
      background:var(--yolo);
      box-shadow:0 0 0 3px rgba(251,191,36,.16);
      flex:0 0 auto;
    }
    .pick b{font-size:11px}
    .pick span{display:block;color:var(--muted);font-size:10px;line-height:1.35;margin-top:1px}

    @media (max-width: 980px){
      body{overflow:auto}
      .app{grid-template-columns:1fr;height:auto}
      .sidebar{height:auto;min-height:auto}
      .daylist{max-height:52vh}
      .map{height:auto;overflow:visible}
      #map{height:55vh}
      .daycard{max-height:none;position:static}
      .blocks{grid-template-columns:1fr 1fr}
    }
  </style>
</head>

<body>
<div class="app">
  <aside class="sidebar">
    <header>
      <p class="title">Mexico Itinerary (Jul 18 – Aug 14, 2026)</p>
      <p class="subtitle">Click a day. Day card is styled like a mini guide entry (AM/PM/Dinner + Yolo picks).</p>
    </header>

    <div class="controls">
      <input id="search" placeholder="Search days (e.g., 'Cerritos', 'Dum', 'Fish Shack')">
      <button id="fit">Fit Map</button>
    </div>

    <div class="daylist" id="daylist"></div>
  </aside>

  <main class="map">
    <div id="map"></div>

    <section class="daycard" id="dayCard">
      <div class="daycard-head">
        <div class="daycard-meta">
          <p class="daycard-kicker" id="dcKicker">Day</p>
          <h2 class="daycard-title" id="dcTitle">Select a day</h2>
          <p class="daycard-sub" id="dcSub">Click a day card on the left.</p>
          <div class="chips" id="dcChips"></div>
        </div>
        <button class="iconbtn" id="dcClose" title="Hide card" aria-label="Hide card">✕</button>
      </div>

      <div class="daycard-scroll"><div class="blocks">
        <div class="block">
          <h4>Overview</h4>
          <div class="muted" id="dcOverview">—</div>
        </div>

        <div class="block">
          <h4>Plan</h4>
          <div class="ampm">
            <div class="row">
              <div class="badge">AM</div>
              <div>
                <h5>Morning</h5>
                <p id="dcAM">—</p>
              </div>
            </div>

            <div class="row">
              <div class="badge">PM</div>
              <div>
                <h5>Afternoon</h5>
                <p id="dcPM">—</p>
              </div>
            </div>

            <div class="row">
              <div class="badge">EVE</div>
              <div>
                <h5>Dinner</h5>
                <p id="dcDinner">—</p>
              </div>
            </div>
          </div>
        </div>

        <div class="block">
          <h4>Dinner picks (Yolo-style)</h4>
          <div class="dinner-grid">
            <div class="dinner-picks" id="dcDinnerPicks"></div>
            <div class="muted" id="dcDinnerNote"></div>
          </div>
        </div>

        <div class="block">
          <h4>Logistics</h4>
          <ul id="dcLogistics"></ul>
        </div>
      </div></div><!-- end blocks / daycard-scroll -->
    </section>
  </main>
</div>

  // For days not explicitly expanded above, we’ll fall back to a simple template
  const fallbackTemplate = (d) => ({

  // Original 28-day skeleton (so list still shows all days)
  const skeleton = [

  // Route animation
  let routeLine = null, routeDot = null, raf = null, dashOffset = 0;
  function clearRoute(){
    if (raf) cancelAnimationFrame(raf);
    raf = null;
    if (routeLine){ map.removeLayer(routeLine); routeLine = null; }
    if (routeDot){ map.removeLayer(routeDot); routeDot = null; }
  }
  function lerp(a,b,t){ return a + (b-a)*t; }
  function animateRoute(seg){
    clearRoute();
    const from = L.latLng(seg.from[0], seg.from[1]);
    const to   = L.latLng(seg.to[0], seg.to[1]);

    routeLine = L.polyline([from,to], {
      color: "#fbbf24",
      weight: 3,
      opacity: 0.95,
      dashArray: "10 12",
      dashOffset: "0",
      className:"route-shadow"
    }).addTo(map);

    routeDot = L.circleMarker(from, { radius:5, color:"#0b0c10", weight:2, fillColor:"#fbbf24", fillOpacity:1 }).addTo(map);
    map.fitBounds(L.latLngBounds([from,to]), { padding:[70,70] });

    const durationMs = 2400;
    const start = performance.now();
    dashOffset = 0;

    function step(now){
      const elapsed = now - start;
      const t = (elapsed % durationMs) / durationMs;

      routeDot.setLatLng([ lerp(from.lat,to.lat,t), lerp(from.lng,to.lng,t) ]);
      dashOffset = (dashOffset - 1.7);
      routeLine.setStyle({ dashOffset: String(dashOffset) });

      raf = requestAnimationFrame(step);
    }
    raf = requestAnimationFrame(step);
  }

  // Card refs
  const dc = {
    root: document.getElementById("dayCard"),
    close: document.getElementById("dcClose"),
    kicker: document.getElementById("dcKicker"),
    title: document.getElementById("dcTitle"),
    sub: document.getElementById("dcSub"),
    chips: document.getElementById("dcChips"),
    overview: document.getElementById("dcOverview"),
    am: document.getElementById("dcAM"),
    pm: document.getElementById("dcPM"),
    dinner: document.getElementById("dcDinner"),
    dinnerPicks: document.getElementById("dcDinnerPicks"),
    dinnerNote: document.getElementById("dcDinnerNote"),
    logistics: document.getElementById("dcLogistics"),
  };

  dc.close.addEventListener("click", () => { dc.root.style.display = "none"; setTimeout(()=> map.invalidateSize(), 50); });

  function showCard(){
    dc.root.style.display = "flex";
    setTimeout(()=> map.invalidateSize(), 50);
  }

  function setLogistics(items){
    dc.logistics.innerHTML = "";
    (items || []).forEach(x => {
      const li = document.createElement("li");
      li.textContent = x;
      dc.logistics.appendChild(li);
    });
    if (!items || items.length === 0){
      const li = document.createElement("li");
      li.textContent = "—";
      dc.logistics.appendChild(li);
    }
  }

  function setChips({stay, hasRoute}){
    const bits = [];
    if (stay && stay !== "—") bits.push(`<span class="chip stay">${stay}</span>`);
    if (hasRoute) bits.push(`<span class="chip route">route</span>`);
    dc.chips.innerHTML = bits.join("");
  }

  function setDinnerPicks(picks){
    dc.dinnerPicks.innerHTML = "";
    (picks || []).slice(0,3).forEach(p => {
      const div = document.createElement("div");
      div.className = "pick";
      div.innerHTML = `<div class="dot"></div><div><b>${p.name}</b><span>${p.note || ""}</span></div>`;
      dc.dinnerPicks.appendChild(div);
    });
    if (!picks || picks.length === 0){
      dc.dinnerPicks.innerHTML = `<div class="muted">—</div>`;
    }
  }

  // Sidebar render
  const daylistEl = document.getElementById('daylist');
  const searchEl = document.getElementById('search');

  function renderList(filter=""){
    daylistEl.innerHTML="";
    const q=filter.trim().toLowerCase();
    days
      .filter(d=>{
        if(!q) return true;
        const blob=[d.title,d.date,d.dow,d.overview,d.am,d.pm,d.dinner,...(d.dinnerOptions||[]).map(x=>x.name)].join(" ").toLowerCase();
        return blob.includes(q);
      })
      .forEach(d=>{
        const stay=stayForDate(d.date);
        const hasRoute = !!travelSegments[d.id];
        const el=document.createElement("div");
        el.className="day";
        el.dataset.id=d.id;

        const pills = [
          hasRoute ? `<span class="pill route">route</span>` : ``,
          (d.tags||[]).includes("travel") ? `<span class="pill flight">travel</span>` : ``
        ].join("");

        el.innerHTML=`
          <div>
            <h3>Day ${d.id} — ${d.dow} ${d.date}</h3>
            <div class="meta">${d.title}<br><span class="muted">Stay: ${stay}</span></div>
          </div>
          <div class="pillrow">${pills}</div>
        `;
        el.addEventListener("click",()=>selectDay(d.id));
        daylistEl.appendChild(el);
      });
  }

  function selectDay(id){
    document.querySelectorAll(".day").forEach(x=>x.classList.remove("active"));
    const active=document.querySelector(`.day[data-id="${id}"]`);
    if(active) active.classList.add("active");

    const d=days.find(x=>x.id===id);
    if(!d) return;

    showCard();

    const stay=stayForDate(d.date);
    const seg=travelSegments[id];

    if(seg){ animateRoute(seg); }
    else{ clearRoute(); map.setView(d.coords, 10, { animate:true }); }

    const m=markers.find(x=>x.id===id)?.marker;
    if(m) m.openPopup();

    dc.kicker.textContent = `DAY ${d.id} — ${d.dow} ${new Date(d.date+"T00:00:00").toLocaleDateString(undefined, {month:"short", day:"numeric"})}`;
    dc.title.textContent = d.title;
    dc.sub.textContent = `Base: ${stay}`;
    setChips({stay, hasRoute: !!seg});

    dc.overview.textContent = d.overview || "—";
    dc.am.textContent = d.am || "—";
    dc.pm.textContent = d.pm || "—";
    dc.dinner.textContent = d.dinner || "—";
    setDinnerPicks(d.dinnerOptions || []);
    dc.dinnerNote.textContent = d.dinnerNote || "";
    setLogistics(d.logistics || []);
  }

  searchEl.addEventListener("input",(e)=>renderList(e.target.value));
  document.getElementById("fit").addEventListener("click",()=>{ clearRoute(); map.fitBounds(bounds,{padding:[40,40]}); });

  renderList("");
  selectDay(2);
